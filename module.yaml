id: forge-t1
name: Forge T1 (Simple Solutions Factory)
description: |
  Risk-Tier 1 factory. Receives feasibility-green plans from the Planning
  module via the Forge Dispatcher and builds Next.js + edge-function
  solutions (no persistence). Six-persona iterate-to-fixed-point loop
  (Builder, Quality, Security, CI/CD, Critic, Tester) with
  max_iterations=10 and a J&J gate when the iteration cap is hit.

active: true

# Multi-persona: subscriptions live per-persona below; top-level subscriptions
# must be empty (module-registry validator enforces this).
subscriptions: []

credentials:
  - GITHUB_TOKEN
  - VERCEL_API_TOKEN
  - VERCEL_ORG_ID

agent:
  model: claude-sonnet-4-6
  max_turns: 120

personas:
  - id: builder
    subscriptions:
      - "forge_t1.persona.builder.requested"
      - "forge_t1.persona.promotion_review.requested"

  - id: quality
    subscriptions:
      - "forge_t1.persona.quality.requested"

  - id: security
    subscriptions:
      - "forge_t1.persona.security.requested"

  - id: ci_cd
    subscriptions:
      - "forge_t1.persona.ci_cd.requested"

  - id: critic
    subscriptions:
      - "forge_t1.persona.critic.requested"

  - id: tester
    subscriptions:
      - "forge_t1.persona.tester.requested"
